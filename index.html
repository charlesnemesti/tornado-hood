<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png?v=fluor1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Tornado Hood — spin into the storm, exit as mist. Private mixes on Robinhood Chain. Born on PONS." />
  <title>Tornado Hood — Spin into the storm. Exit as mist.</title>
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <link rel="stylesheet" href="/splash.css?v=7" />
  <link rel="stylesheet" href="/ui.css?v=1" />
  <script type="module" crossorigin src="/assets/index-DKZ06Cwq.js?v=ui1"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BE_zVwBM.css?v=ui1">
</head>

<body>
  <div id="th-splash" aria-busy="true" aria-live="polite">
    <div class="th-splash-inner">
      <div class="th-tornado-wrap" aria-hidden="true">
        <img class="th-tornado-gif" src="/tornado.gif?v=real1" alt="" width="280" height="280" decoding="async" />
      </div>

      <div class="th-brand">
        <strong>Tornado <span>Hood</span></strong>
        <small>Spinning up the funnel</small>
      </div>

      <div class="th-loader">
        <div class="th-loader-track">
          <div class="th-loader-bar" id="th-bar"></div>
        </div>
        <div class="th-loader-meta">
          <span id="th-status">Initializing storm…</span>
          <b id="th-pct">0%</b>
        </div>
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    (function () {
      var MIN_MS = 1500;
      var splash = document.getElementById('th-splash');
      var bar = document.getElementById('th-bar');
      var pct = document.getElementById('th-pct');
      var status = document.getElementById('th-status');
      var img = document.querySelector('.th-tornado-gif');
      var steps = [
        'Initializing storm…',
        'Loading zk circuits…',
        'Warming anonymity set…',
        'Opening the funnel…',
        'Exit as mist.'
      ];
      var started = performance.now();
      var done = false;

      function setProgress(n) {
        n = Math.max(0, Math.min(100, n));
        bar.style.width = n + '%';
        pct.textContent = Math.round(n) + '%';
        var i = Math.min(steps.length - 1, Math.floor(n / 25));
        status.textContent = steps[i];
      }

      // Keep GIF decoding warm; reload if needed so animation starts
      if (img) {
        img.addEventListener('error', function () {
          status.textContent = 'Storm asset missing…';
        });
      }

      var tick = setInterval(function () {
        if (done) return;
        var elapsed = performance.now() - started;
        var p = (elapsed / MIN_MS) * 100;
        setProgress(p);
        if (elapsed >= MIN_MS) finish();
      }, 32);

      function finish() {
        if (done) return;
        done = true;
        clearInterval(tick);
        setProgress(100);
        status.textContent = steps[steps.length - 1];
        setTimeout(function () {
          splash.classList.add('is-done');
          splash.setAttribute('aria-busy', 'false');
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 700);
        }, 200);
      }
    })();
  </script>
</body>

</html>
