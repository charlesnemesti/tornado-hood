<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png?v=fluor1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Tornado Hood — spin into the storm, exit as mist. Private mixes on Robinhood Chain. Born on PONS." />
  <title>Tornado Hood — Spin into the storm. Exit as mist.</title>
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <link rel="stylesheet" href="/splash.css?v=1" />
  <script type="module" crossorigin src="/assets/index-DKZ06Cwq.js?v=tax2"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BE_zVwBM.css?v=tax2">
</head>

<body>
  <div id="th-splash" aria-busy="true" aria-live="polite">
    <div class="th-splash-inner">
      <div class="th-tornado-wrap" aria-hidden="true">
        <svg class="th-tornado" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle class="glow" cx="100" cy="96" r="52" />
          <ellipse class="ring" cx="100" cy="48" rx="70" ry="16" stroke-width="5" />
          <ellipse class="ring" cx="100" cy="72" rx="56" ry="14" stroke-width="5" />
          <ellipse class="ring" cx="100" cy="94" rx="40" ry="12" stroke-width="4.5" />
          <ellipse class="ring" cx="100" cy="114" rx="26" ry="9" stroke-width="4" />
          <ellipse class="ring" cx="100" cy="130" rx="15" ry="6" stroke-width="3.5" />
          <ellipse class="ring" cx="100" cy="142" rx="7" ry="3.5" stroke-width="3" />
          <path d="M100 146 L96 168 L104 168 Z" fill="#ccff00" opacity="0.9" />
          <path d="M155 70 A58 58 0 0 1 130 125" fill="none" stroke="#ccff00" stroke-width="3.5"
            stroke-linecap="round" opacity="0.85" />
          <path d="M45 95 A52 52 0 0 1 78 48" fill="none" stroke="#ccff00" stroke-width="3.5" stroke-linecap="round"
            opacity="0.75" />
          <polygon points="152,118 164,128 146,132" fill="#ccff00" />
          <polygon points="56,52 44,42 60,40" fill="#ccff00" opacity="0.9" />
        </svg>
      </div>

      <div class="th-brand">
        <strong>Tornado <span>Hood</span></strong>
        <small>Spinning up the funnel</small>
      </div>

      <div class="th-loader">
        <div class="th-loader-track">
          <div class="th-loader-bar" id="th-bar"></div>
        </div>
        <div class="th-loader-meta">
          <span id="th-status">Initializing storm…</span>
          <b id="th-pct">0%</b>
        </div>
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    (function () {
      var splash = document.getElementById('th-splash');
      var bar = document.getElementById('th-bar');
      var pct = document.getElementById('th-pct');
      var status = document.getElementById('th-status');
      var steps = [
        'Initializing storm…',
        'Loading zk circuits…',
        'Warming anonymity set…',
        'Opening the funnel…',
        'Exit as mist.'
      ];
      var progress = 0;
      var done = false;

      function setProgress(n) {
        progress = Math.max(progress, Math.min(100, n));
        bar.style.width = progress + '%';
        pct.textContent = Math.round(progress) + '%';
        var i = Math.min(steps.length - 1, Math.floor(progress / 25));
        status.textContent = steps[i];
      }

      var tick = setInterval(function () {
        if (done) return;
        var next = progress + (progress < 70 ? 2.2 : progress < 92 ? 1.1 : 0.35);
        setProgress(next);
        if (progress >= 100) finish();
      }, 45);

      function finish() {
        if (done) return;
        done = true;
        clearInterval(tick);
        setProgress(100);
        status.textContent = steps[steps.length - 1];
        setTimeout(function () {
          splash.classList.add('is-done');
          splash.setAttribute('aria-busy', 'false');
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 750);
        }, 280);
      }

      // Cap total splash ~2.4s even if intervals drift
      setTimeout(finish, 2400);
    })();
  </script>
</body>

</html>
